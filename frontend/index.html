<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo - Shopping  Cart🛒</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>
  <body class="bg-light">
    <!-- Nav bar -->
     <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top  ">
        <div class="container">
            <a href="#" class="navbar-brand fw-bold">
                Shop demo
            </a>
            <div class="d-flex gap-2 aling-items-center">
                <button 
                class="btn btn-outline-dark position-relative"
                data-bs-toggle="offCanvas"
                dat-bs-target="#cartOffcanvas"
                aria-controls="cartOffcanvas">
                    🛒 Carrito
                    <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
            </div>
        </div>
     </nav>
    <!-- Main -->
     <main class="container py-4 ">
        <!-- Header -->
        <div class="row g-3 align-items-end mb-3">
            <div class="col-12 col-md-6">
                <h1 class="h3 mb-1">Productos</h1>
                <p class="text-muted mb-6">
                    Carrito Responsive + firebase + Stripe + Cloudinary
                </p>
            </div>
            
        </div>

        <div class="col-12 col-md-6">
            <div class="d-flex gap-2 justify-content-md-end">
                <input id="searchInput" 
                class="form-control"
                placeholder="buscar...">
                
                <select id="sortSelect" class="form-select"
                style="max-width: 220px;">
                    <option value="name_asc">Nombre(A-Z)</option>
                    <option value="price_asc">Precio(menor-mayor)</option>
                    <option value="price_desc">Precio(mayor-menor)</option>            
                </select>
            </div>
        </div>

        <!-- Grid para productos -->
         <div id="productsGrid" class="row-g-3"></div>
         
        <!-- Estado vacio en DB -->
          <div id= "emptyState" class="text-center py-5 d-none">
            <div class="display-6">
                ⚠️
            </div>
            <p class="text-muted mt-2">
                No hay productos para mostrar.
            </p>
          </div>
     </main>
    
    <!-- carrito canva -->
     <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title">Tu Carrito</h5>
            <button type="button" data-bs-dimiss="offcanvas" class="btn-close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column gap-3">
            <div id="cartItems" class="d-flex flex-column gap-2"></div>
            <div id="cartEmpty" class="text-muted small d-none">
                Tu carrito esta vacio
            </div>
            
            <div class="mt-auto border-top pt-3">
                <div class="d-flex justify-content-between aling-items-center mb-2">
                    <span class="fw-semibold">Total</span>
                    <span id="cartTotal" class="fw-bold">$0</span>
                </div>

                <button id="checkoutBtn" class="btn btn-outline-secondary w-100 mt-2">
                    Pagar 💵
                </button>

                <button id="clearCartBtn" class="btn btn-outline-secondary w-100 mt-2">
                    Vaciar tu Carrito 🗑️
                </button>
            </div>
            
        </div>
     </div>


     <!-- JavaScript Utilizado -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
